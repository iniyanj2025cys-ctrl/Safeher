<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeHer — Daily Routine</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0a14; --surface: #15121f; --border: #2a2040;
      --accent: #c84b9e; --accent2: #e07ac0;
      --safe: #22c97a; --warn: #f5a623; --danger: #e84040;
      --text: #f2eef9; --muted: #8a7fa8;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
    body::before {
      content:''; position:fixed; top:-180px; left:-180px; width:560px; height:560px;
      background:radial-gradient(circle,rgba(200,75,158,0.11) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; bottom:-180px; right:-180px; width:480px; height:480px;
      background:radial-gradient(circle,rgba(34,201,122,0.08) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* HEADER */
    header {
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 28px; border-bottom:1px solid var(--border);
      background:rgba(13,10,20,0.9); backdrop-filter:blur(14px);
    }
    .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; }
    .logo span { color:var(--accent); }
    .back-btn {
      display:flex; align-items:center; gap:6px;
      font-size:.88rem; color:var(--muted); text-decoration:none; transition:color .2s;
    }
    .back-btn:hover { color:var(--accent); }
    .day-badge {
      font-size:.82rem; color:var(--muted);
      background:var(--surface); border:1px solid var(--border);
      padding:5px 14px; border-radius:20px;
    }

    /* LAYOUT */
    .page { position:relative; z-index:5; max-width:760px; margin:0 auto; padding:28px 24px 60px; }

    /* SECTION TITLE */
    .page-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; margin-bottom:4px; }
    .page-sub { font-size:.88rem; color:var(--muted); margin-bottom:28px; }

    /* ADD FORM */
    .add-card {
      background:var(--surface); border:1px solid var(--border); border-radius:18px;
      padding:22px; margin-bottom:28px; animation:fadeUp .4s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    .add-card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-bottom:16px; color:var(--accent2); }
    .form-row { display:flex; gap:10px; flex-wrap:wrap; }
    .input-wrap { position:relative; flex:1; min-width:160px; }
    .input-wrap input, .input-wrap select {
      width:100%; padding:11px 12px 11px 38px;
      background:rgba(255,255,255,.05); border:1px solid var(--border);
      border-radius:10px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:.88rem;
      outline:none; transition:border-color .2s; appearance:none;
    }
    .input-wrap input:focus, .input-wrap select:focus { border-color:var(--accent); }
    .input-wrap input::placeholder { color:var(--muted); }
    .input-wrap select option { background:#1a1228; }
    .input-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:.95rem; pointer-events:none; }
    .btn-add {
      padding:11px 22px; background:var(--accent); color:#fff;
      border:none; border-radius:10px; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-weight:600; font-size:.88rem;
      transition:all .2s; white-space:nowrap;
    }
    .btn-add:hover { background:var(--accent2); transform:scale(1.03); }

    /* TIMELINE */
    .timeline { display:flex; flex-direction:column; gap:0; }
    .timeline-label {
      font-size:.7rem; letter-spacing:.13em; text-transform:uppercase;
      color:var(--muted); margin-bottom:14px; margin-top:4px;
    }

    .routine-item {
      display:flex; align-items:stretch; gap:0;
      animation:fadeUp .35s ease both;
    }

    /* Left column: time + line */
    .time-col {
      display:flex; flex-direction:column; align-items:center;
      width:70px; flex-shrink:0; padding-top:4px;
    }
    .time-text { font-size:.78rem; color:var(--muted); font-weight:500; white-space:nowrap; }
    .timeline-dot {
      width:12px; height:12px; border-radius:50%; margin:6px 0;
      flex-shrink:0; border:2px solid var(--border);
      background:var(--surface); transition:all .3s;
    }
    .timeline-dot.done { background:var(--safe); border-color:var(--safe); box-shadow:0 0 8px rgba(34,201,122,.5); }
    .timeline-dot.missed { background:var(--danger); border-color:var(--danger); }
    .timeline-dot.upcoming { background:var(--accent); border-color:var(--accent); }
    .timeline-line {
      width:2px; flex:1; background:var(--border); min-height:18px;
    }
    .routine-item:last-child .timeline-line { display:none; }

    /* Card */
    .routine-card {
      flex:1; background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:14px 16px; margin-bottom:12px; margin-left:12px;
      display:flex; align-items:center; gap:14px;
      transition:border-color .2s, transform .15s;
    }
    .routine-card:hover { transform:translateX(3px); border-color:rgba(200,75,158,.3); }
    .routine-card.done { border-color:rgba(34,201,122,.25); }
    .routine-card.missed { border-color:rgba(232,64,64,.3); }

    .routine-emoji { font-size:1.4rem; flex-shrink:0; }
    .routine-info { flex:1; min-width:0; }
    .routine-name { font-weight:600; font-size:.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .routine-meta { font-size:.76rem; color:var(--muted); margin-top:2px; }
    .routine-status {
      font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:20px; flex-shrink:0;
    }
    .status-done { background:rgba(34,201,122,.12); color:var(--safe); }
    .status-missed { background:rgba(232,64,64,.12); color:var(--danger); }
    .status-upcoming { background:rgba(200,75,158,.12); color:var(--accent2); }
    .status-pending { background:rgba(138,127,168,.1); color:var(--muted); }

    .item-actions { display:flex; gap:6px; }
    .icon-btn {
      background:none; border:none; cursor:pointer;
      font-size:1rem; padding:4px; border-radius:6px;
      transition:background .2s; color:var(--muted);
    }
    .icon-btn:hover { background:rgba(255,255,255,.06); color:var(--text); }

    /* CHECK button */
    .check-btn {
      background:none; border:1px solid var(--border); border-radius:8px;
      padding:5px 12px; font-size:.78rem; color:var(--muted);
      cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; flex-shrink:0;
    }
    .check-btn:hover { border-color:var(--safe); color:var(--safe); }
    .check-btn.checked { background:rgba(34,201,122,.12); border-color:var(--safe); color:var(--safe); }

    /* SUMMARY BAR */
    .summary-bar {
      display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;
    }
    .summary-chip {
      flex:1; min-width:100px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:14px 16px; text-align:center;
    }
    .chip-val { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; }
    .chip-val.green { color:var(--safe); }
    .chip-val.pink  { color:var(--accent); }
    .chip-val.red   { color:var(--danger); }
    .chip-key { font-size:.73rem; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.08em; }

    /* EMPTY STATE */
    .empty-state {
      text-align:center; padding:40px 20px; color:var(--muted); font-size:.9rem;
    }
    .empty-state .empty-icon { font-size:2.5rem; margin-bottom:10px; }

    /* NOTIFY TOAST */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:#1e1030; border:1px solid var(--accent);
      color:var(--text); padding:12px 22px; border-radius:12px;
      font-size:.85rem; z-index:999; transition:transform .3s ease;
      box-shadow:0 4px 24px rgba(0,0,0,.5); white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    @media(max-width:500px){ .form-row{flex-direction:column;} .time-col{width:52px;} }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="config.js"></script>
</head>
<body>

<header>
  <a class="back-btn" href="home.html">← Home</a>
  <div class="logo">Safe<span>Her</span></div>
  <div class="day-badge" id="dayBadge">—</div>
</header>

<div class="page">
  <div class="page-title">Daily Routine</div>
  <div class="page-sub">Your checkpoints keep your safety circle informed. Missing one alerts all contacts.</div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="summary-chip"><div class="chip-val pink" id="totalCount">0</div><div class="chip-key">Total</div></div>
    <div class="summary-chip"><div class="chip-val green" id="doneCount">0</div><div class="chip-key">Done</div></div>
    <div class="summary-chip"><div class="chip-val red" id="missedCount">0</div><div class="chip-key">Missed</div></div>
  </div>

  <!-- Add Form -->
  <div class="add-card">
    <div class="add-card-title">＋ Add Checkpoint</div>
    <div class="form-row">
      <div class="input-wrap" style="flex:2;min-width:180px;">
        <span class="input-icon">✏️</span>
        <input type="text" id="activityInput" placeholder="Activity (e.g. Reach college)"/>
      </div>
      <div class="input-wrap">
        <span class="input-icon">🕐</span>
        <input type="time" id="timeInput"/>
      </div>
      <div class="input-wrap">
        <span class="input-icon">🏷️</span>
        <select id="categoryInput">
          <option value="🏠 Home">🏠 Home</option>
          <option value="🏫 College">🏫 College</option>
          <option value="🚌 Transit">🚌 Transit</option>
          <option value="🏥 Health">🏥 Health</option>
          <option value="🛒 Errand">🛒 Errand</option>
          <option value="🌙 Night">🌙 Night</option>
          <option value="📍 Other">📍 Other</option>
        </select>
      </div>
      <button class="btn-add" onclick="addRoutine()">Add</button>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-label">Today's Schedule</div>
  <div class="timeline" id="timeline">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      No checkpoints yet. Add your first routine above!
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Data ──
  let routines = JSON.parse(localStorage.getItem('safeher_routines') || '[]');

  // ── Emergency contacts — loaded from session ──
  let CONTACTS = [];

  function loadContacts() {
    try {
      const stored = sessionStorage.getItem('emergencyContacts');
      if (stored) {
        CONTACTS = JSON.parse(stored).filter(c => c.name).map(c => ({ name: c.name }));
      }
    } catch(e) {}
    if (CONTACTS.length === 0) CONTACTS = [{ name: 'Emergency Contact' }];
  }

  // ── Auth guard ──
  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = 'index.html'; return; }
    loadContacts();
    setDayBadge();
    render();
  });

  // ── Day badge ──
  function setDayBadge() {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now = new Date();
    document.getElementById('dayBadge').textContent =
      `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  }

  // ── Add routine ──
  function addRoutine() {
    const name = document.getElementById('activityInput').value.trim();
    const time = document.getElementById('timeInput').value;
    const cat  = document.getElementById('categoryInput').value;
    if (!name) { showToast('⚠️ Please enter an activity name'); return; }
    if (!time) { showToast('⚠️ Please set a time'); return; }

    const item = { id: Date.now(), name, time, category: cat, done: false };
    routines.push(item);
    routines.sort((a,b) => a.time.localeCompare(b.time));
    save();
    render();

    document.getElementById('activityInput').value = '';
    document.getElementById('timeInput').value = '';
    showToast('✅ Checkpoint added!');
  }

  // ── Mark done ──
  function markDone(id) {
    const item = routines.find(r => r.id === id);
    if (!item) return;
    item.done = !item.done;
    save();
    render();
    if (item.done) showToast(`✅ "${item.name}" marked complete`);
  }

  // ── Delete ──
  function deleteRoutine(id) {
    routines = routines.filter(r => r.id !== id);
    save();
    render();
    showToast('🗑️ Checkpoint removed');
  }

  // ── Compute status ──
  function getStatus(item) {
    if (item.done) return 'done';
    const now = new Date();
    const [h, m] = item.time.split(':').map(Number);
    const itemDate = new Date(); itemDate.setHours(h, m, 0, 0);
    const diff = (itemDate - now) / 60000; // minutes
    if (diff < -15) return 'missed';
    if (diff >= 0) return 'upcoming';
    return 'pending';
  }

  // ── Get emoji by category ──
  function getEmoji(cat) {
    const map = {'🏠 Home':'🏠','🏫 College':'🏫','🚌 Transit':'🚌','🏥 Health':'🏥','🛒 Errand':'🛒','🌙 Night':'🌙','📍 Other':'📍'};
    return map[cat] || '📍';
  }

  // ── Render ──
  function render() {
    const container = document.getElementById('timeline');
    if (routines.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>No checkpoints yet. Add your first routine above!</div>`;
      updateSummary();
      return;
    }

    container.innerHTML = routines.map((item, i) => {
      const status = getStatus(item);
      const dotClass = status === 'done' ? 'done' : status === 'missed' ? 'missed' : status === 'upcoming' ? 'upcoming' : '';
      const cardClass = status === 'done' ? 'done' : status === 'missed' ? 'missed' : '';
      const statusLabel = status === 'done' ? 'Done' : status === 'missed' ? 'Missed' : status === 'upcoming' ? 'Upcoming' : 'Pending';
      const statusClass = `status-${status}`;

      return `
        <div class="routine-item" style="animation-delay:${i*0.05}s">
          <div class="time-col">
            <div class="time-text">${fmt12(item.time)}</div>
            <div class="timeline-dot ${dotClass}"></div>
            <div class="timeline-line"></div>
          </div>
          <div class="routine-card ${cardClass}">
            <div class="routine-emoji">${getEmoji(item.category)}</div>
            <div class="routine-info">
              <div class="routine-name">${item.name}</div>
              <div class="routine-meta">${item.category} · ${fmt12(item.time)}</div>
            </div>
            <span class="routine-status ${statusClass}">${statusLabel}</span>
            <button class="check-btn ${item.done?'checked':''}" onclick="markDone(${item.id})">
              ${item.done ? '✓ Done' : 'Mark Done'}
            </button>
            <div class="item-actions">
              <button class="icon-btn" title="Delete" onclick="deleteRoutine(${item.id})">🗑️</button>
            </div>
          </div>
        </div>`;
    }).join('');

    updateSummary();
    checkMissed();
  }

  // ── Summary counts ──
  function updateSummary() {
    const total  = routines.length;
    const done   = routines.filter(r => getStatus(r) === 'done').length;
    const missed = routines.filter(r => getStatus(r) === 'missed').length;
    document.getElementById('totalCount').textContent  = total;
    document.getElementById('doneCount').textContent   = done;
    document.getElementById('missedCount').textContent = missed;
  }

  // ── Auto-notify on missed checkpoints ──
  function checkMissed() {
    routines.forEach(item => {
      if (getStatus(item) === 'missed' && !item.notified) {
        item.notified = true;
        notifyAllContacts(item);
        save();
      }
    });
  }

  // ── Notify ALL emergency contacts ──
  function notifyAllContacts(item) {
    CONTACTS.forEach(contact => {
      const msg = `⚠️ SafeHer Alert: Priya missed her "${item.name}" checkpoint scheduled at ${fmt12(item.time)}. Please check on her.`;
      // In production: Firebase / SMS API call here
      console.log(`[SafeHer] Notifying ${contact.name}: ${msg}`);
    });
    showToast(`⚠️ Missed "${item.name}" — All ${CONTACTS.length} contacts notified`);
  }

  // ── Format 12-hour time ──
  function fmt12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hr = h % 12 || 12;
    return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  // ── Toast ──
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Save ──
  function save() { localStorage.setItem('safeher_routines', JSON.stringify(routines)); }

  // ── Auto-refresh every 30s to update statuses ──
  setInterval(() => { render(); }, 30000);

  // ── Init handled by onAuthStateChanged above ──
</script>
</body>
</html>
